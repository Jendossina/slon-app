name: Syntax check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check JS module syntax
        run: |
          for f in js/*.js; do
            echo "Checking $f"
            node --check "$f"
          done

      - name: Check inline bootstrap script syntax
        run: |
          node -e "
            const fs = require('fs');
            const html = fs.readFileSync('index.html', 'utf8');
            const matches = [...html.matchAll(/<script>([\s\S]*?)<\/script>/g)];
            for (const m of matches) { new Function(m[1]); }
            console.log('Inline script OK');
          "
